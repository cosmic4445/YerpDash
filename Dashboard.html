<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hub-topbar">
    <div class="staff-dropdown-wrap">
      <button class="staff-btn" onclick="toggleDropdown()">
        <span id="staffName">Staff</span>
        <span class="arrow" id="arrow">▾</span>
      </button>
      <div class="dropdown-menu" id="dropdownMenu">
        <button onclick="window.location.href='settings.html'">⚙️ Settings</button>
        <button onclick="window.location.href='help.html'">❓ Help</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </div>

  <div class="hub-content">
    <div class="panel">
      <h2>Player Control</h2>

      <div class="search-row">
        <select id="playerSelect" onchange="onPlayerSelected()">
          <option value="">Loading players...</option>
        </select>
        <button onclick="loadPlayers()" title="Refresh">🔄</button>
      </div>

      <div id="playerInfo" class="player-info" style="display:none">
        <div class="player-name-display">
          <span id="playerDisplayName">—</span>
          <span class="uid-badge" id="playerIDLabel"></span>
        </div>
        <div class="action-grid">
          <button class="action-btn" onclick="openModal('role')">🎖️ Give Role</button>
          <button class="action-btn kick-btn" onclick="kickPlayer()">👢 Kick</button>
          <button class="action-btn ban-btn" onclick="openModal('ban')">🔨 Ban</button>
        </div>
      </div>

      <div id="statusMsg" class="status-msg"></div>
    </div>
  </div>

  <div class="modal-bg" id="modalBg" onclick="closeModal(event)">
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
