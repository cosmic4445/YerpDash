<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Help</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hub-topbar">
    <div class="staff-dropdown-wrap">
      <button class="staff-btn" onclick="toggleDropdown()">
        <span id="staffName">Staff</span>
        <span class="arrow" id="arrow">▾</span>
      </button>
      <div class="dropdown-menu" id="dropdownMenu">
        <button onclick="window.location.href='settings.html'">⚙️ Settings</button>
        <button id="devBtn" onclick="window.location.href='dev.html'" style="display:none">🛠️ Dev Panel</button>
        <button onclick="window.location.href='help.html'">❓ Help</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </div>

  <div class="hub-content" style="padding-top:80px;justify-content:flex-start;align-items:center;">
    <div class="panel" style="width:560px;margin-top:40px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h2>❓ Help & Q&A</h2>
        <button id="createPostBtn" onclick="openPostModal()" style="display:none;padding:8px 16px;font-size:13px;border-radius:8px;">+ Create Post</button>
      </div>
      <div id="postsList"></div>
    </div>
  </div>

  <div class="modal-bg" id="modalBg" onclick="closeModal(event)">
    <div class="modal" style="width:400px;" id="modalContent">
      <h3>📝 Create Post</h3>
      <label>Title</label>
      <input type="text" id="postTitle" placeholder="Post title...">
      <label>Content</label>
      <textarea id="postContent" style="height:120px;" placeholder="Write your post..."></textarea>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button onclick="submitPost()">Post</button>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
  <script type="module" src="help.js"></script>
</body>
</html>
