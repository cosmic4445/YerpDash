<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moderation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hub-topbar">
    <div class="staff-dropdown-wrap">
      <button class="staff-btn" onclick="toggleDropdown()">
        <span id="staffName">Staff</span>
        <span class="arrow" id="arrow">▾</span>
      </button>
      <div class="dropdown-menu" id="dropdownMenu">
        <button id="devBtn" onclick="window.location.href='dev.html'" style="display:none">🛠️ Dev Panel</button>
        <button onclick="window.location.href='settings.html'">⚙️ Settings</button>
        <button onclick="window.location.href='help.html'">❓ Help</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn" onclick="window.location.href='dashboard.html'">🏠 Home</button>
      <button class="tab-btn active" onclick="window.location.href='moderation.html'">🛡️ Moderation</button>
      <button class="tab-btn" onclick="window.location.href='playfab.html'">🎮 PlayFab</button>
      <button class="tab-btn" onclick="window.location.href='fun.html'">🎉 Fun</button>
    </div>
  </div>

  <div class="page-content">
    <div class="panel" style="width:500px;">
      <h2>🛡️ Moderation</h2>

      <!-- Player Select -->
      <div class="settings-section">
        <div class="settings-label">Select Player</div>
        <div class="search-row">
          <select id="playerSelect" onchange="onPlayerSelected()">
            <option value="">Loading players...</option>
          </select>
          <button onclick="loadPlayers()" title="Refresh">🔄</button>
        </div>
        <div id="selectedPlayer" style="display:none">
          <div class="player-name-display">
            <span id="playerDisplayName">—</span>
            <span class="uid-badge" id="playerIDLabel"></span>
          </div>
        </div>
      </div>

      <!-- Ban -->
      <div class="settings-section" id="banSection">
        <div class="settings-label">Ban Player</div>
        <div class="settings-row">
          <select id="banDuration">
            <option value="1">1 Hour</option>
            <option value="24">24 Hours</option>
            <option value="168">7 Days</option>
            <option value="720">30 Days</option>
            <option value="0">Permanent</option>
          </select>
          <input type="text" id="banReason" placeholder="Reason...">
          <button class="ban-btn-inline" onclick="banPlayer()">🔨 Ban</button>
        </div>
      </div>

      <!-- Kick -->
      <div class="settings-section" id="kickSection">
        <div class="settings-label">Kick Player</div>
        <div class="settings-row">
          <input type="text" id="kickReason" placeholder="Reason (optional)...">
          <button class="kick-btn-inline" onclick="kickPlayer()">👢 Kick</button>
        </div>
      </div>

      <!-- Mute -->
      <div class="settings-section">
        <div class="settings-label">Mute Player</div>
        <div class="coming-soon">🚧 Coming Soon</div>
      </div>

      <div id="statusMsg" class="status-msg"></div>
    </div>
  </div>

  <div class="modal-bg" id="modalBg" onclick="closeModal(event)">
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="dashboard.js"></script>
  <script src="moderation.js"></script>
</body>
</html>
